<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrasi Akun</title>
  

  <style>
  /* Reset & Base Styling */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #0f0c29; /* Dark Background */
    background: linear-gradient(135deg, #000000, #240b36); /* Black to Deep Purple Gradient */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffffff;
  }

  /* Container Card */
  .container {
    background-color: rgba(20, 20, 20, 0.9);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px rgba(138, 43, 226, 0.3);
    width: 100%;
    max-width: 400px;
    text-align: center;
    border: 1px solid rgba(138, 43, 226, 0.2);
  }

  h1 {
    margin-bottom: 25px;
    font-weight: 600;
    color: #bb86fc; /* Light Purple */
    letter-spacing: 1px;
  }

  /* Message styling */
  #message {
    margin-bottom: 15px;
    font-size: 0.9em;
    min-height: 20px;
  }

  /* Form Styling */
  #registrationForm {
    display: flex;
    flex-direction: column;
  }

  input[type="text"],
  input[type="password"] {
    padding: 12px 15px;
    margin-bottom: 5px; /* Spasi antar input */
    border: 1px solid #333;
    border-radius: 8px;
    background-color: #1a1a1a;
    color: white;
    outline: none;
    transition: all 0.3s ease;
  }

  input:focus {
    border-color: #bb86fc;
    box-shadow: 0 0 8px rgba(187, 134, 252, 0.4);
  }

  /* Button Styling */
  button {
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #6200ea, #bb86fc);
    color: white;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(187, 134, 252, 0.4);
  }

  button:active {
    transform: translateY(0);
  }

  /* Link Styling */
  p {
    margin-top: 20px;
    font-size: 0.9em;
    color: #aaa;
  }

  a {
    color: #bb86fc;
    text-decoration: none;
    transition: color 0.3s;
  }

  a:hover {
    color: #ffffff;
    text-decoration: underline;
  }

  /* Custom styling for status messages */
  #message b, #message strong {
    color: #03dac6; /* Cyan-Green for success text */
  }
</style>
</head>
 
<body>
  <div class="container">
    <h1>Registrasi Akun Baru</h1>
    <div id="message"></div>
    <form id="registrationForm">
      <input type="text" id="username" placeholder="Username" required />
      <br><br>
      <input type="password" id="password" placeholder="Password" required />
      <br><br>
      <button type="submit">Daftar</button>
    </form>
    <p>Sudah punya akun? <a href="/login/">Login di sini</a></p>
  </div>
 
  <script>
    const form = document.getElementById('registrationForm');
    const messageDiv = document.getElementById('message');
 
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      messageDiv.textContent = '';
      messageDiv.style.color = 'red';
 
      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
 
        const result = await response.json();
 
        if (response.status === 201 && result.success) {
          messageDiv.style.color = 'green';
          messageDiv.innerHTML = 'Registrasi **berhasil!** Silakan <a href="/login/">login</a>.';
          form.reset();
        } else {
          messageDiv.textContent = result.message || 'Registrasi gagal!';
        }
      } catch (error) {
        messageDiv.textContent = 'Terjadi kesalahan jaringan. Silakan coba lagi.';
      }
    });
  </script>
</body>
 
</html>
